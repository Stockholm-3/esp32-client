name: Build

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build — compiles firmware for the target chip
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Firmware Build (ESP32-S3)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache ESP-IDF
        uses: actions/cache@v4
        with:
          path: ~/esp/esp-idf
          key: esp-idf-${{ hashFiles('**/idf_component.yml') }}-v1
          restore-keys: esp-idf-

      - name: Cache ESP-IDF tools (.espressif)
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: espressif-tools-${{ hashFiles('**/idf_component.yml') }}-v1
          restore-keys: espressif-tools-

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ github.sha }}
          restore-keys: build-

      - name: Install ESP-IDF
        run: |
          if [ ! -d "$HOME/esp/esp-idf/.git" ]; then
            mkdir -p ~/esp
            git clone --depth 1 --branch v5.4.1 \
              https://github.com/espressif/esp-idf.git ~/esp/esp-idf
          fi
          ~/esp/esp-idf/install.sh esp32s3
        env:
          IDF_TOOLS_PATH: ~/.espressif

      - name: Build firmware
        run: |
          source ~/esp/esp-idf/export.sh
          idf.py build
        env:
          IDF_TOOLS_PATH: ~/.espressif

      - name: Print binary sizes
        if: success()
        run: |
          source ~/esp/esp-idf/export.sh
          idf.py size
        env:
          IDF_TOOLS_PATH: ~/.espressif

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            build/*.bin
            build/*.elf
            build/*.map
            build/flasher_args.json
          retention-days: 30

      - name: Upload firmware artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: build/
          retention-days: 7
