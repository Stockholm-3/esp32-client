name: Lint

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "main/**"
      - "components/**"
      - ".clang-tidy"
      - "CMakeLists.txt"
      - "**/CMakeLists.txt"
      - "idf_component.yml"
      - "**/idf_component.yml"
      - "scripts/**"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "main/**"
      - "components/**"
      - ".clang-tidy"
      - "CMakeLists.txt"
      - "**/CMakeLists.txt"
      - "idf_component.yml"
      - "**/idf_component.yml"
      - "scripts/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: clang-tidy
    runs-on: ubuntu-24.04

    env:
      IDF_VERSION: v6.0
      IDF_TARGET: esp32s3
      IDF_PATH: /home/runner/esp/esp-idf
      IDF_TOOLS_PATH: /home/runner/.espressif

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache ESP-IDF repo
        id: cache-idf
        uses: actions/cache@v4
        with:
          path: /home/runner/esp/esp-idf
          key: esp-idf-v6.0

      - name: Clone ESP-IDF
        if: steps.cache-idf.outputs.cache-hit != 'true'
        run: |
          mkdir -p /home/runner/esp
          git clone --depth 1 --branch ${{ env.IDF_VERSION }} --recursive \
            https://github.com/espressif/esp-idf.git ${{ env.IDF_PATH }}

      - name: Cache ESP-IDF tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: /home/runner/.espressif
          key: espressif-tools-v6.0-esp32s3

      - name: Install ESP-IDF tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: ${{ env.IDF_PATH }}/install.sh ${{ env.IDF_TARGET }}

      - name: Install clang-tidy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-tidy \
            python3-pip
          pip install --quiet --break-system-packages clang-tidy

      - name: Cache compile_commands.json
        id: cache-compdb
        uses: actions/cache@v4
        with:
          path: build/compile_commands.json
          key: compdb-v6.0-esp32s3-${{ hashFiles('**/CMakeLists.txt', '**/idf_component.yml') }}

      - name: Generate compile_commands.json
        if: steps.cache-compdb.outputs.cache-hit != 'true'
        run: |
          source ${{ env.IDF_PATH }}/export.sh
          idf.py reconfigure

      - name: Scrub compile_commands.json
        run: |
          source ${{ env.IDF_PATH }}/export.sh
          make lint-scrub

      - name: Run clang-tidy
        run: |
          source ${{ env.IDF_PATH }}/export.sh
          make lint-ci

      - name: Upload lint DB on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-db-${{ github.sha }}
          path: build/lint/compile_commands.json
          retention-days: 7
