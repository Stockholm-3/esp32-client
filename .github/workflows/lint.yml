name: Lint

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: clang-tidy
    runs-on: ubuntu-24.04

    env:
      IDF_VERSION: v6.0
      IDF_TARGET: esp32s3
      IDF_PATH: /home/runner/esp/esp-idf
      IDF_TOOLS_PATH: /home/runner/.espressif

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache ESP-IDF repo
        id: cache-idf
        uses: actions/cache@v4
        with:
          path: ${{ env.IDF_PATH }}
          key: esp-idf-${{ env.IDF_VERSION }}

      - name: Clone ESP-IDF
        if: steps.cache-idf.outputs.cache-hit != 'true'
        run: |
          mkdir -p /home/runner/esp
          git clone --depth 1 --branch ${{ env.IDF_VERSION }} --recursive \
            https://github.com/espressif/esp-idf.git ${{ env.IDF_PATH }}

      - name: Cache ESP-IDF tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: ${{ env.IDF_TOOLS_PATH }}
          key: espressif-tools-${{ env.IDF_VERSION }}-${{ env.IDF_TARGET }}

      - name: Install ESP-IDF tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: ${{ env.IDF_PATH }}/install.sh ${{ env.IDF_TARGET }}

      - name: Install clang-tidy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-tidy python3-pip
          pip install --quiet --break-system-packages clang-tidy

      - name: Prepare Compile Database
        run: |
          source ${{ env.IDF_PATH }}/export.sh
          # Reconfigure is the "drastic change" proof way to generate the DB
          idf.py reconfigure

      - name: Run Linter
        run: |
          source ${{ env.IDF_PATH }}/export.sh
          # lint-ci includes the scrub step via the Makefile dependency
          make lint-ci

      - name: Upload lint DB on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-db-${{ github.sha }}
          path: build/lint/compile_commands.json
          retention-days: 7
