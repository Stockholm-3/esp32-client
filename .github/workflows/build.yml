name: Build

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "main/**"
      - "components/**"
      - "CMakeLists.txt"
      - "**/CMakeLists.txt"
      - "idf_component.yml"
      - "**/idf_component.yml"
      - "sdkconfig.defaults"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "main/**"
      - "components/**"
      - "CMakeLists.txt"
      - "**/CMakeLists.txt"
      - "idf_component.yml"
      - "**/idf_component.yml"
      - "sdkconfig.defaults"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IDF_VERSION:    v6.0
  IDF_TARGET:     esp32s3
  IDF_PATH:       /home/runner/esp/esp-idf
  IDF_TOOLS_PATH: /home/runner/.espressif

jobs:
  build:
    name: Firmware (${{ env.IDF_TARGET }}, IDF ${{ env.IDF_VERSION }})
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── ESP-IDF repo ────────────────────────────────────────────────────────
      - name: Cache ESP-IDF repo
        id: cache-idf
        uses: actions/cache@v4
        with:
          path: ${{ env.IDF_PATH }}
          key: esp-idf-${{ env.IDF_VERSION }}

      - name: Clone ESP-IDF
        if: steps.cache-idf.outputs.cache-hit != 'true'
        run: |
          mkdir -p $(dirname $IDF_PATH)
          git clone --depth 1 --branch $IDF_VERSION --recursive \
            https://github.com/espressif/esp-idf.git $IDF_PATH

      # ── ESP-IDF tools (Xtensa toolchain, OpenOCD, etc.) ─────────────────────
      - name: Cache ESP-IDF tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: ${{ env.IDF_TOOLS_PATH }}
          key: espressif-tools-${{ env.IDF_VERSION }}-${{ env.IDF_TARGET }}

      - name: Install ESP-IDF tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: $IDF_PATH/install.sh $IDF_TARGET

      # ── Managed components cache ─────────────────────────────────────────────
      # Keyed on the component manifests so a lockfile change busts the cache.
      - name: Cache managed components
        uses: actions/cache@v4
        with:
          path: managed_components
          key: managed-components-${{ hashFiles('**/idf_component.yml') }}
          restore-keys: managed-components-

      # ── Build cache ──────────────────────────────────────────────────────────
      # Keyed on source + cmake files so that touching only docs or scripts
      # does not invalidate the build cache.
      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ env.IDF_VERSION }}-${{ env.IDF_TARGET }}-${{ hashFiles('main/**', 'components/**', '**/CMakeLists.txt', 'sdkconfig.defaults') }}
          restore-keys: |
            build-${{ env.IDF_VERSION }}-${{ env.IDF_TARGET }}-

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Set target
        run: |
          source $IDF_PATH/export.sh
          idf.py set-target $IDF_TARGET

      - name: Build firmware
        run: |
          source $IDF_PATH/export.sh
          idf.py build

      # ── Post-build info ──────────────────────────────────────────────────────
      - name: Print binary sizes
        run: |
          source $IDF_PATH/export.sh
          idf.py size-components

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ env.IDF_TARGET }}-${{ github.sha }}
          path: |
            build/*.bin
            build/*.elf
            build/*.map
            build/flasher_args.json
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            build/CMakeFiles/**/*.log
            build/**/*.log
          retention-days: 7
